<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBBS.LAB | Thermodynamics</title>
    
    <!-- Tailwind CSS (via CDN for immediate local use) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in-up': 'fadeUp 1s ease-out forwards',
                        'fade-in': 'fadeIn 1.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM (via CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compiles JSX to JS in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- KaTeX for Physics Formulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            overflow-x: hidden;
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        /* Custom Scrollbar for Chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- GLOBAL SETTINGS ---
        const apiKey = ""; // Add Gemini API Key here for chatbot functionality

        // --- INLINE ICONS (Replacing Lucide-React for pure HTML compatibility) ---
        const IconActivity = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconExternal = ({size=14, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const IconCode = ({size=14, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>;
        const IconGithub = ({size=18, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>;
        const IconSparkles = ({size=20, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;
        const IconSend = ({size=16, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const IconDatabase = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>;
        const IconMinimize = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="4 14 10 14 10 20"></polyline><polyline points="20 10 14 10 14 4"></polyline><line x1="14" y1="10" x2="21" y2="3"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>;
        const IconMaximize = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>;

        // --- COMPONENTS ---

        // LaTeX Formula Renderer
        const LaTeX = ({ formula, displayMode = false }) => {
            const containerRef = useRef(null);
            
            useEffect(() => {
                const renderMath = () => {
                    if (containerRef.current && window.katex) {
                        try {
                            window.katex.render(formula, containerRef.current, {
                                throwOnError: false,
                                displayMode: displayMode
                            });
                        } catch (e) {
                            console.error("KaTeX error:", e);
                        }
                    }
                };
                
                // Retry rendering if KaTeX hasn't loaded yet
                if (window.katex) {
                    renderMath();
                } else {
                    const interval = setInterval(() => {
                        if (window.katex) {
                            renderMath();
                            clearInterval(interval);
                        }
                    }, 100);
                    return () => clearInterval(interval);
                }
            }, [formula, displayMode]);

            return <span ref={containerRef} className={displayMode ? "block my-4 text-center text-lg" : "inline-block text-indigo-300 font-medium"} />;
        };

        // Navigation Bar
        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });

            return (
                <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-500 ${scrolled ? 'bg-black/80 backdrop-blur-xl border-b border-white/10 py-4' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6 lg:px-12 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => scrollTo('hero')}>
                            <div className="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <IconActivity size={16} className="text-white" />
                            </div>
                            <span className="font-bold tracking-tight text-lg text-white">GIBBS<span className="text-white/50">.LAB</span></span>
                        </div>
                        <div className="hidden md:flex gap-8 items-center bg-white/5 px-6 py-2 rounded-full border border-white/10 backdrop-blur-md">
                            {['Simulation', 'Theory', 'Architecture', 'AI Assistant'].map((item) => (
                                <button key={item} onClick={() => scrollTo(item.toLowerCase().split(' ')[0])} className="text-xs font-medium text-gray-400 hover:text-white transition-colors uppercase tracking-wider">
                                    {item}
                                </button>
                            ))}
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-indigo-500/10 border border-indigo-500/20 rounded-full text-indigo-400 text-[10px] font-bold tracking-widest uppercase">
                                <div className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse" /> Live System
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        // Embedded Physics Simulation
        const EmbeddedSimulation = () => (
            <div className="w-full h-[600px] xl:h-[750px] bg-[#050505] rounded-[2rem] border border-white/10 overflow-hidden relative shadow-[0_0_50px_rgba(0,0,0,0.5)] group">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-rose-500 opacity-50 z-10 pointer-events-none" />
                
                <iframe 
                    src="https://amishajoshi360-cpu.github.io/gibbs-ensemble-simulation/"
                    className="w-full h-full border-0"
                    title="Gibbs Ensemble Simulation"
                />
                
                <div className="absolute bottom-6 right-6 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-auto">
                    <a 
                        href="https://amishajoshi360-cpu.github.io/gibbs-ensemble-simulation/" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        className="px-4 py-2 bg-black/60 backdrop-blur-md border border-white/10 text-xs font-mono text-white rounded-xl flex items-center gap-2 hover:bg-white/10 transition-colors shadow-2xl"
                    >
                        Open Fullscreen <IconExternal size={14} />
                    </a>
                </div>
            </div>
        );

        // Code Display Block
        const CodeSection = () => (
            <div className="glass-panel rounded-[2rem] overflow-hidden shadow-2xl">
                <div className="flex justify-between items-center px-6 py-4 border-b border-white/5 bg-white/[0.02]">
                    <div className="flex gap-2">
                        <div className="w-3 h-3 rounded-full bg-red-500/80" />
                        <div className="w-3 h-3 rounded-full bg-yellow-500/80" />
                        <div className="w-3 h-3 rounded-full bg-green-500/80" />
                    </div>
                    <div className="text-xs font-mono text-gray-500 flex items-center gap-2"><IconCode size={14}/> physics_engine.js</div>
                </div>
                <div className="p-6 md:p-8 overflow-x-auto text-sm font-mono leading-loose">
<pre className="text-gray-300">
<span className="text-pink-400">const</span> <span className="text-blue-400">resolveCollision</span> <span className="text-pink-400">=</span> (p1, p2) <span className="text-pink-400">{`=>`}</span> {'{\n'}
  <span className="text-gray-500">  // Calculate relative velocity and normal vectors</span>
  <span className="text-pink-400">  const</span> dx <span className="text-pink-400">=</span> p1.x - p2.x;
  <span className="text-pink-400">  const</span> dy <span className="text-pink-400">=</span> p1.y - p2.y;
  <span className="text-pink-400">  const</span> distance <span className="text-pink-400">=</span> Math.<span className="text-yellow-300">sqrt</span>(dx * dx + dy * dy);
  
  <span className="text-gray-500">  // Collision response using 1D elastic formulation</span>
  <span className="text-pink-400">  const</span> nx <span className="text-pink-400">=</span> dx / distance;
  <span className="text-pink-400">  const</span> ny <span className="text-pink-400">=</span> dy / distance;
  <span className="text-pink-400">  const</span> impulse <span className="text-pink-400">=</span> -(2 * (dvx * nx + dvy * ny)) / 2;
  
  <span className="text-gray-500">  // Update momentum states (Microcanonical exchange)</span>
  p1.vx += impulse * nx;
  p1.vy += impulse * ny;
  p2.vx -= impulse * nx;
  p2.vy -= impulse * ny;
{'}'};
</pre>
                </div>
            </div>
        );

        // Chatbot Integration
        const AIResearchAssistant = () => {
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([
                { role: 'model', text: 'Greetings. I am the Gibbs Ensemble AI. I can explain the statistical mechanics operating in the simulation above, derive formulas, or break down the physics code. How may I assist your research?' }
            ]);
            const [isTyping, setIsTyping] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isTyping]);

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const prompt = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', text: prompt }]);
                
                if (!apiKey) {
                    setTimeout(() => {
                        setMessages(prev => [...prev, { role: 'model', text: "API Key not configured. Please add your Gemini API key to the code to enable neural responses." }]);
                    }, 1000);
                    return;
                }

                setIsTyping(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "You are a physics research assistant. Explain concepts like Canonical ensembles clearly. Use LaTeX wrapped in $ for inline or $$ for block equations." }] }
                        })
                    });
                    
                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "I encountered an anomaly in the data stream.";
                    setMessages(prev => [...prev, { role: 'model', text: aiText }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'model', text: "Connection interrupted. Please ensure your API key is valid." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const renderText = (text) => {
                const parts = text.split(/(\$\$[\s\S]*?\$\$|\$.*?\$)/g);
                return parts.map((part, i) => {
                    if (part.startsWith('$$')) return <LaTeX key={i} formula={part.slice(2, -2)} displayMode={true} />;
                    if (part.startsWith('$')) return <LaTeX key={i} formula={part.slice(1, -1)} />;
                    const boldParts = part.split(/(\*\*.*?\*\*)/g);
                    return (
                        <span key={i}>
                            {boldParts.map((bp, j) => bp.startsWith('**') ? <strong key={j} className="text-white font-semibold">{bp.slice(2, -2)}</strong> : bp)}
                        </span>
                    );
                });
            };

            return (
                <div className="glass-panel rounded-[2rem] shadow-2xl overflow-hidden flex flex-col h-[600px] relative">
                    <div className="absolute top-0 w-full h-32 bg-gradient-to-b from-indigo-500/10 to-transparent pointer-events-none" />
                    
                    <div className="px-8 py-6 border-b border-white/5 flex items-center gap-4 bg-white/[0.01]">
                        <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-lg shadow-white/10">
                            <IconSparkles className="text-black" size={20} />
                        </div>
                        <div>
                            <h3 className="font-bold text-white text-lg tracking-tight">Gibbs Intelligence</h3>
                            <p className="text-xs text-indigo-400 font-mono flex items-center gap-2">
                                <span className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse" /> SYSTEM ONLINE
                            </p>
                        </div>
                    </div>

                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-8 space-y-8 scroll-smooth">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex gap-4 animate-fade-in-up ${m.role === 'user' ? 'justify-end' : ''}`}>
                                {m.role === 'model' && (
                                    <div className="w-8 h-8 rounded-full bg-indigo-600 flex-shrink-0 flex items-center justify-center mt-1 shadow-lg shadow-indigo-600/30">
                                        <IconSparkles size={14} className="text-white" />
                                    </div>
                                )}
                                <div className={`max-w-[80%] leading-relaxed text-[15px] ${m.role === 'user' ? 'bg-white text-black px-6 py-4 rounded-3xl rounded-tr-sm font-medium shadow-xl' : 'text-gray-300 space-y-4'}`}>
                                    {renderText(m.text)}
                                </div>
                            </div>
                        ))}
                        {isTyping && (
                            <div className="flex gap-4 animate-fade-in-up">
                                <div className="w-8 h-8 rounded-full bg-indigo-600 flex-shrink-0 flex items-center justify-center mt-1">
                                    <div className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                </div>
                                <div className="bg-white/5 rounded-2xl px-6 py-4 text-gray-400 text-sm flex items-center gap-2">
                                    Processing multidimensional data...
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="p-6 bg-black/50 border-t border-white/5 backdrop-blur-xl">
                        <div className="relative group">
                            <input 
                                type="text" 
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSend()}
                                placeholder="Ask about entropy, microstates, or the code..."
                                className="w-full bg-[#111] border border-white/10 rounded-2xl py-4 pl-6 pr-14 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all shadow-inner"
                            />
                            <button 
                                onClick={handleSend}
                                disabled={!input.trim() || isTyping}
                                className="absolute right-2 top-1/2 -translate-y-1/2 p-2.5 bg-white text-black rounded-xl hover:scale-105 active:scale-95 disabled:opacity-50 disabled:hover:scale-100 transition-all shadow-lg"
                            >
                                <IconSend size={16} className="ml-0.5" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const SectionHeader = ({ title, subtitle }) => (
            <div className="mb-16">
                <span className="text-indigo-400 font-mono text-sm tracking-[0.2em] uppercase mb-4 block">{subtitle}</span>
                <h2 className="text-4xl md:text-5xl font-bold text-white tracking-tight">{title}</h2>
            </div>
        );

        // --- MAIN APPLICATION ---
        const App = () => {
            return (
                <div>
                    <Navbar />

                    {/* Premium Hero Section */}
                    <section id="hero" className="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden">
                        <div className="absolute inset-0 pointer-events-none opacity-40 animate-fade-in">
                            <div className="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-indigo-600/20 blur-[120px] rounded-full mix-blend-screen" />
                            <div className="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-rose-600/10 blur-[150px] rounded-full mix-blend-screen" />
                        </div>

                        <div className="relative z-10 max-w-5xl mx-auto px-6 text-center animate-fade-in-up">
                            <div className="mb-8 inline-flex items-center gap-3 px-4 py-2 rounded-full bg-white/5 border border-white/10 backdrop-blur-md shadow-xl shadow-white/5">
                                <span className="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]"></span>
                                <span className="text-[10px] font-bold tracking-widest uppercase text-gray-300">Statistical Mechanics Sandbox</span>
                            </div>
                            
                            <h1 className="text-6xl md:text-8xl font-black tracking-tighter mb-8 leading-[1.1]">
                                From <span className="bg-clip-text text-transparent bg-gradient-to-r from-gray-400 to-gray-700">Chaos</span><br/>
                                To <span className="bg-clip-text text-transparent bg-gradient-to-r from-white via-indigo-200 to-indigo-500">Order.</span>
                            </h1>
                            
                            <p className="text-xl md:text-2xl text-gray-400 max-w-3xl mx-auto font-light leading-relaxed mb-12">
                                An interactive exploration of the Gibbs Ensemble. Observe macroscopic equilibrium emerging dynamically from microscopic deterministic collisions.
                            </p>
                            
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                                <button onClick={() => document.getElementById('simulation')?.scrollIntoView({behavior:'smooth'})} className="px-8 py-4 bg-white text-black rounded-2xl font-bold hover:scale-105 transition-transform flex items-center justify-center gap-2 shadow-[0_0_40px_rgba(255,255,255,0.2)]">
                                    Explore Simulation
                                </button>
                                <a href="https://github.com/amishajoshi360-cpu" target="_blank" rel="noreferrer" className="px-8 py-4 bg-white/5 border border-white/10 rounded-2xl text-white font-bold hover:bg-white/10 transition-colors flex items-center justify-center gap-2">
                                    <IconGithub size={18} /> View Source
                                </a>
                            </div>
                        </div>
                    </section>

                    <main className="max-w-7xl mx-auto px-6 lg:px-12 space-y-40 pb-40 relative z-10">
                        
                        {/* Core Concepts */}
                        <section id="theory" className="pt-20 scroll-mt-32">
                            <SectionHeader subtitle="Fundamentals" title="Statistical Ensembles" />
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[
                                    { t: 'Microcanonical', icon: <IconMinimize className="text-indigo-400" size={24}/>, d: 'Constant $N, V, E$. Represents a perfectly isolated system where energy is strictly conserved across all microstates.'},
                                    { t: 'Canonical', icon: <IconDatabase className="text-rose-400" size={24}/>, d: 'Constant $N, V, T$. The system exchanges heat with a thermal reservoir, leading to energy fluctuations governed by the Boltzmann factor.'},
                                    { t: 'Grand Canonical', icon: <IconMaximize className="text-emerald-400" size={24}/>, d: 'Constant $\\mu, V, T$. Both energy and particles are exchanged with reservoirs. Essential for modeling open systems and phase transitions.'}
                                ].map((c, i) => (
                                    <div key={i} className="p-8 rounded-[2rem] bg-[#0A0A0A] border border-white/5 hover:border-white/20 transition-colors group shadow-2xl">
                                        <div className="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mb-8 border border-white/10 group-hover:scale-110 transition-transform">
                                            {c.icon}
                                        </div>
                                        <h3 className="text-2xl font-bold mb-4">{c.t}</h3>
                                        <p className="text-gray-400 leading-relaxed text-sm"><LaTeX formula={c.d} /></p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Interactive Workspace */}
                        <section id="simulation" className="scroll-mt-32">
                            <SectionHeader subtitle="Interactive Workspace" title="Equilibrium Dynamics" />
                            <EmbeddedSimulation />
                        </section>

                        {/* Deep Dive & Code */}
                        <section id="architecture" className="scroll-mt-32">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                                <div>
                                    <SectionHeader subtitle="Under the Hood" title="Deterministic Chaos" />
                                    <div className="space-y-6 text-gray-400 leading-relaxed text-lg">
                                        <p>The simulation above doesn't cheat. Every visual shift in color and temperature is the result of thousands of raw, elastic 2D collisions computed in real-time.</p>
                                        <p>We model the particles as hard spheres. When two particles intersect, we calculate their relative velocities along the normal vector of impact. Momentum is perfectly exchanged via <LaTeX formula="$\Delta \vec{p} = \int \vec{F} dt$" />.</p>
