<script>

let n = 80;
let x1=[], y1=[], vx1=[], vy1=[];
let x2=[], y2=[], vx2=[], vy2=[];
let energyA=[], energyB=[];

function init(n){
    x1 = Array.from({length:n},()=>Math.random());
    y1 = Array.from({length:n},()=>Math.random());
    x2 = Array.from({length:n},()=>Math.random()*0.3);

}

init(n);

let ctxA = document.getElementById("A").getContext("2d");
let ctxB = document.getElementById("B").getContext("2d");

function draw(ctx,x,y,color){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,400,400);

    for(let i=0;i<x.length;i++){
        ctx.beginPath();
        ctx.arc(x[i]*400, y[i]*400, 3, 0, 2*Math.PI);
        ctx.fillStyle=color;
        ctx.fill();
    }
}

function variance(arr){
    let mean = arr.reduce((a,b)=>a+b)/arr.length;
    return arr.reduce((a,b)=>a+(b-mean)*(b-mean),0)/arr.length;
}

function avg(arr){
    return arr.reduce((a,b)=>a+b)/arr.length;
}

function detect(){
    if(energyA.length < 15) return "Non-Equilibrium";

    let recentA = energyA.slice(-10);
    let recentB = energyB.slice(-10);

    let varA = variance(recentA);
    let varB = variance(recentB);

    if(varA < 0.0005 && varB < 0.0005){
        return "Equilibrium";
    }
    return "Transition";
}

function update(){

    let temp = parseFloat(document.getElementById("temp").value);
    let speed = parseFloat(document.getElementById("speed").value);
    let ensemble = document.getElementById("ensemble").value;
    let newN = parseInt(document.getElementById("particles").value);

    if(newN !== n){
        n = newN;
        init(n);
    }

    for(let i=0;i<n;i++){
        x1[i]=(x1[i]+vx1[i]*speed)%1;
        y1[i]=(y1[i]+vy1[i]*speed)%1;
        x2[i]=(x2[i]+vx2[i]*speed)%1;
        y2[i]=(y2[i]+vy2[i]*speed)%1;
    }

    if(ensemble==="canonical"){
        for(let i=0;i<n;i++){
            vx1[i]*=temp;
            vy1[i]*=temp;
            vx2[i]*=temp;
            vy2[i]*=temp;
        }
    }

    if(ensemble==="grand"){
        if(Math.random()<0.05 && n>20){
            x1.pop(); y1.pop(); vx1.pop(); vy1.pop();
            x2.pop(); y2.pop(); vx2.pop(); vy2.pop();
            n--;
        }
        if(Math.random()<0.05 && n<150){
            x1.push(Math.random());
            y1.push(Math.random());
            vx1.push((Math.random()-0.5)*0.04);
            vy1.push((Math.random()-0.5)*0.04);

            x2.push(Math.random());
            y2.push(Math.random());
            vx2.push((Math.random()-0.5)*0.01);
            vy2.push((Math.random()-0.5)*0.01);
            n++;
        }
    }

    for(let i=0;i<n;i++){
        if(Math.random()<0.05){
            let tempvx = vx1[i];
            let tempvy = vy1[i];

            vx1[i] = vx2[i];
            vy1[i] = vy2[i];

            vx2[i] = tempvx;
            vy2[i] = tempvy;
        }
    }

    let e1 = vx1.map((v,i)=>v*v + vy1[i]*vy1[i]);
    let e2 = vx2.map((v,i)=>v*v + vy2[i]*vy2[i]);

    energyA.push(avg(e1));
    energyB.push(avg(e2));

    let state = detect();
    document.getElementById("state").innerText = "State: " + state;

    draw(ctxA,x1,y1,"cyan");
    draw(ctxB,x2,y2,"orange");

    requestAnimationFrame(update);
}

update();

<\\/script>
</body>
</html>"""

  const dx = p1.x - p2.x;
  const dy = p1.y - p2.y;
  const distance = Math.sqrt(dx * dx + dy * dy);
  
  // Collision response using 1D elastic formulation
  const nx = dx / distance;
  const ny = dy / distance;
  const impulse = -(2 * (dvx * nx + dvy * ny)) / 2;
  
  // Update momentum states (Microcanonical exchange)

  p1.vy += impulse * ny;

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const prompt = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', text: prompt }]);
                
                if (!apiKey) {
                    setTimeout(() => {
                        setMessages(prev => [...prev, { role: 'model', text: "API Key not configured. Please add your Gemini API key to the code to enable neural responses." }]);
                    }, 1000);
                    return;
                }

                setIsTyping(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "You are a physics research assistant. Explain concepts like Canonical ensembles clearly. Use LaTeX wrapped in $ for inline or $$ for block equations." }] }
                        })
                    });
                    
                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "I encountered an anomaly in the data stream.";
                    setMessages(prev => [...prev, { role: 'model', text: aiText }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'model', text: "Connection interrupted. Please ensure your API key is valid." }]);
                } finally {
                    setIsTyping(false);
                }
            };

            const renderText = (text) => {
                const parts = text.split(/(\$\$[\s\S]*?\$\$|\$.*?\$)/g);
                return parts.map((part, i) => {
                    if (part.startsWith('$$')) return <LaTeX key={i} formula={part.slice(2, -2)} displayMode={true} />;
                    if (part.startsWith('$')) return <LaTeX key={i} formula={part.slice(1, -1)} />;
                    const boldParts = part.split(/(\*\*.*?\*\*)/g);
                    return (
                        <span key={i}>
                            {boldParts.map((bp, j) => bp.startsWith('**') ? <strong key={j} className="text-white font-semibold">{bp.slice(2, -2)}</strong> : bp)}
                        </span>
                    );
                });
            };

            return (
                <div className="glass-panel rounded-[2rem] shadow-2xl overflow-hidden flex flex-col h-[600px] relative">
                    <div className="absolute top-0 w-full h-32 bg-gradient-to-b from-indigo-500/10 to-transparent pointer-events-none" />
                    
                    <div className="px-8 py-6 border-b border-white/5 flex items-center gap-4 bg-white/[0.01]">
                        <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-lg shadow-white/10">
                            <IconSparkles className="text-black" size={20} />
                        </div>
                        <div>
                            <h3 className="font-bold text-white text-lg tracking-tight">Gibbs Intelligence</h3>
                            <p className="text-xs text-indigo-400 font-mono flex items-center gap-2">
                                <span className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse" /> SYSTEM ONLINE
                            </p>
                        </div>
                    </div>

                    <div ref={scrollRef} className="flex-1 overflow-y-auto p-8 space-y-8 scroll-smooth">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex gap-4 animate-fade-in-up ${m.role === 'user' ? 'justify-end' : ''}`}>
                                {m.role === 'model' && (
                                    <div className="w-8 h-8 rounded-full bg-indigo-600 flex-shrink-0 flex items-center justify-center mt-1 shadow-lg shadow-indigo-600/30">
                                        <IconSparkles size={14} className="text-white" />
                                    </div>
                                )}
                                <div className={`max-w-[80%] leading-relaxed text-[15px] ${m.role === 'user' ? 'bg-white text-black px-6 py-4 rounded-3xl rounded-tr-sm font-medium shadow-xl' : 'text-gray-300 space-y-4'}`}>
                                    {renderText(m.text)}
                                </div>
                            </div>
                        ))}
                        {isTyping && (
                            <div className="flex gap-4 animate-fade-in-up">
                                <div className="w-8 h-8 rounded-full bg-indigo-600 flex-shrink-0 flex items-center justify-center mt-1">
                                    <div className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                </div>
                                <div className="bg-white/5 rounded-2xl px-6 py-4 text-gray-400 text-sm flex items-center gap-2">
                                    Processing multidimensional data...
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="p-6 bg-black/50 border-t border-white/5 backdrop-blur-xl">
                        <div className="relative group">
                            <input 
                                type="text" 
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSend()}
                                placeholder="Ask about entropy, microstates, or the code..."
                                className="w-full bg-[#111] border border-white/10 rounded-2xl py-4 pl-6 pr-14 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all shadow-inner"
                            />
                            <button 
                                onClick={handleSend}
                                disabled={!input.trim() || isTyping}
                                className="absolute right-2 top-1/2 -translate-y-1/2 p-2.5 bg-white text-black rounded-xl hover:scale-105 active:scale-95 disabled:opacity-50 disabled:hover:scale-100 transition-all shadow-lg"
                            >
                                <IconSend size={16} className="ml-0.5" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const SectionHeader = ({ title, subtitle }) => (
            <div className="mb-16">
                <span className="text-indigo-400 font-mono text-sm tracking-[0.2em] uppercase mb-4 block">{subtitle}</span>
                <h2 className="text-4xl md:text-5xl font-bold text-white tracking-tight">{title}</h2>
            </div>
        );

        // --- MAIN APPLICATION ---
        const App = () => {
            return (
                <div>
                    <Navbar />

                    {/* Premium Hero Section */}
                    <section id="hero" className="relative min-h-screen flex items-center justify-center pt-20 overflow-hidden">
                        <div className="absolute inset-0 pointer-events-none opacity-40 animate-fade-in">
                            <div className="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-indigo-600/20 blur-[120px] rounded-full mix-blend-screen" />
                            <div className="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-rose-600/10 blur-[150px] rounded-full mix-blend-screen" />
                        </div>

                        <div className="relative z-10 max-w-5xl mx-auto px-6 text-center animate-fade-in-up">
                            <div className="mb-8 inline-flex items-center gap-3 px-4 py-2 rounded-full bg-white/5 border border-white/10 backdrop-blur-md shadow-xl shadow-white/5">
                                <span className="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]"></span>
                                <span className="text-[10px] font-bold tracking-widest uppercase text-gray-300">Statistical Mechanics Sandbox</span>
                            </div>
                            
                            <h1 className="text-6xl md:text-8xl font-black tracking-tighter mb-8 leading-[1.1]">
                                From <span className="bg-clip-text text-transparent bg-gradient-to-r from-gray-400 to-gray-700">Chaos</span><br/>
                                To <span className="bg-clip-text text-transparent bg-gradient-to-r from-white via-indigo-200 to-indigo-500">Order.</span>
                            </h1>
                            
                            <p className="text-xl md:text-2xl text-gray-400 max-w-3xl mx-auto font-light leading-relaxed mb-12">
                                An interactive exploration of the Gibbs Ensemble. Observe macroscopic equilibrium emerging dynamically from microscopic deterministic collisions.
                            </p>
                            
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                                <button onClick={() => document.getElementById('simulation')?.scrollIntoView({behavior:'smooth'})} className="px-8 py-4 bg-white text-black rounded-2xl font-bold hover:scale-105 transition-transform flex items-center justify-center gap-2 shadow-[0_0_40px_rgba(255,255,255,0.2)]">
                                    Explore Simulation
                                </button>
                                <a href="https://github.com/amishajoshi360-cpu" target="_blank" rel="noreferrer" className="px-8 py-4 bg-white/5 border border-white/10 rounded-2xl text-white font-bold hover:bg-white/10 transition-colors flex items-center justify-center gap-2">
                                    <IconGithub size={18} /> View Source
                                </a>
                            </div>
                        </div>
                    </section>

                    <main className="max-w-7xl mx-auto px-6 lg:px-12 space-y-40 pb-40 relative z-10">
                        
                        {/* Core Concepts */}
                        <section id="theory" className="pt-20 scroll-mt-32">
                            <SectionHeader subtitle="Fundamentals" title="Statistical Ensembles" />
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {[
                                    { t: 'Microcanonical', icon: <IconMinimize className="text-indigo-400" size={24}/>, d: <span>Constant <LaTeX formula="N, V, E"/>. Represents a perfectly isolated system where energy is strictly conserved across all microstates.</span>},
                                    { t: 'Canonical', icon: <IconDatabase className="text-rose-400" size={24}/>, d: <span>Constant <LaTeX formula="N, V, T"/>. The system exchanges heat with a thermal reservoir, leading to energy fluctuations governed by the Boltzmann factor.</span>},
                                    { t: 'Grand Canonical', icon: <IconMaximize className="text-emerald-400" size={24}/>, d: <span>Constant <LaTeX formula="\mu, V, T"/>. Both energy and particles are exchanged with reservoirs. Essential for modeling open systems and phase transitions.</span>}
                                ].map((c, i) => (
                                    <div key={i} className="p-8 rounded-[2rem] bg-[#0A0A0A] border border-white/5 hover:border-white/20 transition-colors group shadow-2xl">
                                        <div className="w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center mb-8 border border-white/10 group-hover:scale-110 transition-transform">
                                            {c.icon}
                                        </div>
                                        <h3 className="text-2xl font-bold mb-4">{c.t}</h3>
                                        <p className="text-gray-400 leading-relaxed text-sm">{c.d}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Interactive Workspace */}
                        <section id="simulation" className="scroll-mt-32">
                            <SectionHeader subtitle="Interactive Workspace" title="Equilibrium Dynamics" />
                            <EmbeddedSimulation />
                        </section>

                        {/* Deep Dive & Code */}
                        <section id="architecture" className="scroll-mt-32">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                                <div>
                                    <SectionHeader subtitle="Under the Hood" title="Deterministic Chaos" />
                                    <div className="space-y-6 text-gray-400 leading-relaxed text-lg">
                                        <p>The simulation above doesn't cheat. Every visual shift in color and temperature is the result of thousands of raw, elastic 2D collisions computed in real-time. Momentum is perfectly exchanged via <LaTeX formula="\Delta \vec{p} = \int \vec{F} dt" />.</p>
                                        <p>Alternatively, the base logic can be executed by a simple Python script (<span className="text-white font-mono text-sm bg-white/10 px-2 py-0.5 rounded">generate_sim.py</span>) that procedurally creates the HTML UI shown previously. This allows you to toggle rapidly between <strong>Microcanonical</strong>, <strong>Canonical</strong>, and <strong>Grand Canonical</strong> rulesets by generating pure vanilla Javascript without heavy frameworks.</p>
                                        <p>The beauty of the <strong className="text-white">Gibbs Ensemble</strong> is that we don't need to track every particle. By looking at the macroscopic averages—calculated via the Partition Function <LaTeX formula="Z = \sum e^{-\beta E_i}" />—we can perfectly predict the system's eventual steady state.</p>
                                    </div>
                                </div>
                                <CodeSection />
                            </div>
                        </section>

                        {/* Research Paper Section */}
                        <section id="research" className="scroll-mt-32">
                            <SectionHeader subtitle="Publication" title="Theoretical Framework" />
                            <ResearchPaperSection />
                        </section>

                        {/* Chatbot Interface */}
                        <section id="ai" className="scroll-mt-32">
                            <SectionHeader subtitle="Ask the Model" title="Neural Interface" />
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                                <div className="lg:col-span-4 space-y-6">
                                    <h3 className="text-2xl font-bold">Your Personal Physicist.</h3>
                                    <p className="text-gray-400 leading-relaxed">
                                        Stuck on the math? Wondering how the code handles boundary conditions? 
                                        The integrated intelligence model is context-aware of this specific simulation and standard thermodynamic theory.
                                    </p>
                                    <div className="p-6 rounded-3xl bg-indigo-500/10 border border-indigo-500/20 text-indigo-300 text-sm">
                                        <strong className="block text-indigo-200 mb-2 font-mono uppercase tracking-widest">Suggested Queries</strong>
                                        <ul className="space-y-2">
                                            <li>→ "Derive the partition function."</li>
                                            <li>→ "How does entropy relate to information theory?"</li>
                                            <li>→ "Explain the code's collision logic."</li>
                                        </ul>
                                    </div>
                                </div>
                                <div className="lg:col-span-8">
                                    <AIResearchAssistant />
                                </div>
                            </div>
                        </section>

                    </main>

                    {/* Premium Footer */}
                    <footer className="border-t border-white/5 bg-[#050505] py-12 px-6 lg:px-12 relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-px bg-gradient-to-r from-transparent via-indigo-500/50 to-transparent" />
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-3">
                                <IconActivity size={18} className="text-indigo-500" />
                                <span className="font-bold tracking-tight text-white">GIBBS.LAB</span>
                            </div>
                            <p className="text-[10px] text-gray-500 font-mono tracking-widest uppercase">
                                © 2026 • Physics Engine V4.0 • Built for Modern Browsers
                            </p>
                            <div className="flex gap-4">
                                <a href="https://github.com/amishajoshi360-cpu" target="_blank" rel="noreferrer" className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors"><IconGithub size={18}/></a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
